---
layout: default
title: "Salle des Échos"
soustitre: "Ce qui demeure, ce qui se dépose, ce qui trace les saisons du territoire."
permalink: /archives/
class: echos
---

<div class="echos-privee">

  <div class="barre-recherche">

    <div class="barre-celeste">

      <!-- LAPIN TOUT À GAUCHE -->
      <div class="lapin-retour">
        <a href="/" title="Retour à l’accueil" class="lapin-icone">
          🐇
        </a>
      </div>

      <div class="titre-echos">Archives</div>

      <div class="bloc-date">
        <label for="annee">Année</label>
        <select id="annee"></select>

        <label for="mois">Mois</label>
        <select id="mois"></select>
      </div>

      <div class="titre-archives">Salle des Échos</div>

    </div>

    <!-- BARRE ÉCHO — visible après sélection -->
    <div class="barre-filtres hidden">
      <input type="text" placeholder="Appeler un écho…" class="champ-appel" id="champ-echo">
      <button id="reset-echos" class="btn-reset">Reset</button>
    </div>

  </div>

  <div class="echos-contenu">
    <div id="constellation-echos"></div>

    <div id="message-echos" class="hidden message-echos">
      Aucun écho n’a encore traversé cette période.
    </div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ----------------------------------------------------
     1. Récupération des contenus depuis Jekyll
  ---------------------------------------------------- */

  const echos = [
    {% assign echos = site.actualites 
      | concat: site.creations 
      | concat: site.idees 
      | concat: site.spiritualite
      | concat: site.passe %}

    {% for item in echos %}
      {
        title: "{{ item.title | strip_newlines | escape }}",
        resume: "{{ item.resume | strip_newlines | escape }}",
        search: "{{ item.title | strip_newlines | escape }} {{ item.resume | strip_newlines | escape }}",
        url: "{{ item.url | relative_url }}",
        slug: "{{ item.slug }}",
        date: "{{ item.date | date: '%Y-%m-%d' }}",
        collection: "{{ item.collection }}"
      },
    {% endfor %}
  ];

  /* ----------------------------------------------------
     2. Conteneurs
  ---------------------------------------------------- */

  const constellation = document.getElementById("constellation-echos");
  const messageEchos = document.getElementById("message-echos");
  const champEcho = document.getElementById("champ-echo");
  const boutonReset = document.getElementById("reset-echos");

  /* ----------------------------------------------------
     3. Utilitaires
  ---------------------------------------------------- */

  function cacher(sel) { document.querySelector(sel)?.classList.add("hidden"); }
  function montrer(sel) { document.querySelector(sel)?.classList.remove("hidden"); }

  function viderConstellation() {
    constellation.innerHTML = "";
    constellation.classList.remove("visible");
  }

  function nettoyer(str) {
    return String(str || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[\u200B-\u200D\uFEFF]/g, "")
      .replace(/\s+/g, " ")
      .trim()
      .toLowerCase();
  }

  /* ----------------------------------------------------
     4. État initial
  ---------------------------------------------------- */

  cacher(".barre-filtres");
  viderConstellation();
  messageEchos.classList.add("hidden");

  /* ----------------------------------------------------
     5. Menus Année / Mois — VERSION ROBUSTE
  ---------------------------------------------------- */
function remplirMenus() {
  const selectAnnee = document.getElementById("annee");
  const selectMois = document.getElementById("mois");

  const annees = [...new Set(
    echos.map(e => e.date.substring(0, 4))
  )].sort((a, b) => b - a);

  selectAnnee.innerHTML = '<option value="">—</option>';
  annees.forEach(annee => {
    const opt = document.createElement("option");
    opt.value = annee;
    opt.textContent = annee;
    selectAnnee.appendChild(opt);
  });

  selectAnnee.addEventListener("change", () => {
    const anneeChoisie = selectAnnee.value;

    if (!anneeChoisie) {
      selectMois.innerHTML = '<option value="">—</option>';
      return;
    }

    const moisDisponibles = [...new Set(
      echos
        .filter(e => e.date.substring(0, 4) == anneeChoisie)
        .map(e => parseInt(e.date.substring(5, 7), 10))
    )].sort((a, b) => b - a);

    selectMois.innerHTML = '<option value="">—</option>';
    moisDisponibles.forEach(mois => {
      const opt = document.createElement("option");
      opt.value = mois;
      opt.textContent = mois.toString().padStart(2, "0");
      selectMois.appendChild(opt);
    });
  });
}

  remplirMenus();

  /* ----------------------------------------------------
     6. Filtrage temporel — VERSION ROBUSTE
  ---------------------------------------------------- */

  function filtrerParDate(annee, mois) {
    const prefix = `${annee}-${String(mois).padStart(2, "0")}`;
    return echos.filter(e => e.date.startsWith(prefix));
  }

  /* ----------------------------------------------------
     7. Réaction Année / Mois
  ---------------------------------------------------- */

  function onChangeAnneeOuMois(callback) {
    document.getElementById("annee").addEventListener("change", callback);
    document.getElementById("mois").addEventListener("change", callback);
  }

  onChangeAnneeOuMois(() => {
    const anneeChoisie = document.getElementById("annee").value;
    const moisChoisi = document.getElementById("mois").value;

    if (!anneeChoisie || !moisChoisi) {
      viderConstellation();
      cacher(".barre-filtres");
      messageEchos.classList.add("hidden");
      return;
    }

    const articlesFiltres = filtrerParDate(anneeChoisie, moisChoisi);

    if (articlesFiltres.length > 0) {
      afficherConstellation(articlesFiltres);

      setTimeout(() => {
        constellation.classList.add("visible");
        jouerMedium();
      }, 10);

      montrer(".barre-filtres");
      messageEchos.classList.add("hidden");

    } else {
      viderConstellation();
      cacher(".barre-filtres");

      messageEchos.classList.remove("hidden");
      setTimeout(() => messageEchos.classList.add("visible"), 10);
    }
  });

  /* ----------------------------------------------------
     8. Constellation
  ---------------------------------------------------- */

  function afficherConstellation(liste) {
    viderConstellation();

    liste.forEach(echo => {
      const point = document.createElement("div");
      point.classList.add("point-echo");

      point.style.top = (15 + Math.random() * 75) + "%";
      point.style.left = Math.random() * 90 + "%";

      point.dataset.title = echo.title;
      point.dataset.resume = echo.resume;
      point.dataset.search = echo.search;

      point.addEventListener("click", () => {
        window.location.href = echo.url;
      });

      constellation.appendChild(point);
    });
  }

  /* ----------------------------------------------------
     9. Sons
  ---------------------------------------------------- */

  const sonMedium = document.getElementById("son-medium");
  const sonAigu   = document.getElementById("son-aigu");

  function jouerMedium() {
    if (!sonMedium) return;
    sonMedium.currentTime = 0;
    sonMedium.play();
  }

  function jouerAigu() {
    if (!sonAigu) return;
    sonAigu.currentTime = 0;
    sonAigu.play();
  }

  /* ----------------------------------------------------
     10. Reset
  ---------------------------------------------------- */

  if (boutonReset) {
    boutonReset.addEventListener("click", () => {
      if (champEcho) champEcho.value = "";
      document.querySelectorAll(".point-echo").forEach(p => p.classList.remove("revelation"));
    });
  }

  /* ----------------------------------------------------
     11. Révélation poétique
  ---------------------------------------------------- */

  if (champEcho) {
    champEcho.addEventListener("input", () => {
      const mot = nettoyer(champEcho.value);

      if (mot.length < 3) {
        document.querySelectorAll(".point-echo").forEach(p => p.classList.remove("revelation"));
        return;
      }

      if (mot.length === 3) {
        document.querySelectorAll(".point-echo").forEach(p => {
          p.classList.add("pre-resonance");
          setTimeout(() => p.classList.remove("pre-resonance"), 600);
        });
      }

      document.querySelectorAll(".point-echo").forEach(point => {
        const champRecherche = nettoyer(point.dataset.search);
        if (champRecherche.includes(mot)) {
          const deja = point.classList.contains("revelation");
          if (!deja) jouerAigu();
          point.classList.add("revelation");
        }
      });
    });
  }

}); // FIN DOMContentLoaded
</script>

{% include sons-echos.html %}
