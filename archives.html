<div class="echos-privee">

  <div class="barre-recherche">

      <label for="mois">Mois</label>
      <select id="mois"></select>
    </div>

  </div>

          <circle cx="60" cy="50" r="0.9" class="etoile-fixe"
                  data-col="actualites" data-index="3" />
          <circle cx="70" cy="40" r="0.9" class="etoile-fixe"
                  data-col="actualites" data-index="4" />
        </g>

        <!-- CASSIOPEIA — creations -->

                  data-col="creations" data-index="1" />
          <circle cx="50" cy="15" r="0.9" class="etoile-fixe"
                  data-col="creations" data-index="2" />
          <circle cx="60" cy="25" r="0.9" class="etoile-fixe"

          <circle cx="70" cy="15" r="0.9" class="etoile-fixe"

      Aucun écho n’a encore traversé cette période.
    </div>

  </div>

<script>
/* ----------------------------------------------------
   ÉCHOS — CONSTELLATION FIXE (SVG) + SONS + RÉVÉLATION
---------------------------------------------------- */

document.addEventListener("DOMContentLoaded", () => {

  /* ----------------------------------------------------
     1. Récupération des contenus depuis Jekyll
  ---------------------------------------------------- */

  const echos = [
    {% assign echos = site.actualites 
      | concat: site.creations 
      | concat: site.idees 
      | concat: site.spiritualite
      | concat: site.passe %}

    {% for item in echos %}
      {
        title: "{{ item.title }}",
        url: "{{ item.url | relative_url }}",
        slug: "{{ item.slug }}",
        excerpt: "{{ item.excerpt | strip_newlines | escape }}",
        sound: "/sons/{{ item.slug }}.mp3",
        date: "{{ item.date | date: '%Y-%m-%d' }}",
        collection: "{{ item.collection }}"
      },
    {% endfor %}
  ];

  /* ----------------------------------------------------
     2. Conteneurs
  ---------------------------------------------------- */

  const constellation = document.getElementById("constellation-echos");
  const messageEchos = document.getElementById("message-echos");
  const svg = document.getElementById("fond-constellations");

  /* ----------------------------------------------------
     3. Fonctions utilitaires
  ---------------------------------------------------- */

  function cacher(selector) {
    document.querySelector(selector).classList.add("hidden");
  }

  function montrer(selector) {
    document.querySelector(selector).classList.remove("hidden");
  }

  function viderConstellation() {
    // On supprime uniquement les points dynamiques
    constellation.querySelectorAll(".point-echo").forEach(p => p.remove());
  }

  /* ----------------------------------------------------
     4. État initial
  ---------------------------------------------------- */

  cacher(".barre-filtres");
  viderConstellation();
  messageEchos.classList.add("hidden");

  /* ----------------------------------------------------
     5. Menus Année / Mois
  ---------------------------------------------------- */

  function remplirMenus() {
    const selectAnnee = document.getElementById("annee");
    const selectMois = document.getElementById("mois");

    const annees = [...new Set(
      echos.map(e => new Date(e.date).getFullYear())
    )].sort((a, b) => b - a);

    selectAnnee.innerHTML = '<option value="">—</option>';
    annees.forEach(annee => {
      const opt = document.createElement("option");
      opt.value = annee;
      opt.textContent = annee;
      selectAnnee.appendChild(opt);
    });

    selectAnnee.addEventListener("change", () => {
      const anneeChoisie = selectAnnee.value;

      if (!anneeChoisie) {
        selectMois.innerHTML = '<option value="">—</option>';
        return;
      }

      const moisDisponibles = [...new Set(
        echos
          .filter(e => new Date(e.date).getFullYear() == anneeChoisie)
          .map(e => new Date(e.date).getMonth() + 1)
      )].sort((a, b) => b - a);

      selectMois.innerHTML = '<option value="">—</option>';
      moisDisponibles.forEach(mois => {
        const opt = document.createElement("option");
        opt.value = mois;
        opt.textContent = mois.toString().padStart(2, "0");
        selectMois.appendChild(opt);
      });
    });
  }

  remplirMenus();

  /* ----------------------------------------------------
     6. Filtrage temporel
  ---------------------------------------------------- */

  function filtrerParDate(annee, mois) {
    return echos.filter(echo => {
      const d = new Date(echo.date);
      return d.getFullYear() == annee && (d.getMonth() + 1) == mois;
    });
  }

  /* ----------------------------------------------------
     7. Écoute des changements Année/Mois
  ---------------------------------------------------- */

  function onChangeAnneeOuMois(callback) {
    document.getElementById("annee").addEventListener("change", callback);
    document.getElementById("mois").addEventListener("change", callback);
  }

  onChangeAnneeOuMois(() => {
    const anneeChoisie = document.getElementById("annee").value;
    const moisChoisi = document.getElementById("mois").value;

    if (!anneeChoisie || !moisChoisi) {
      viderConstellation();
      cacher(".barre-filtres");
      messageEchos.classList.add("hidden");
      return;
    }

    const articlesFiltres = filtrerParDate(anneeChoisie, moisChoisi);

    if (articlesFiltres.length > 0) {
      afficherConstellation(articlesFiltres);

      montrer(".barre-filtres");
      messageEchos.classList.add("hidden");

    } else {
      viderConstellation();
      cacher(".barre-filtres");

      messageEchos.classList.remove("hidden");
    }
  });

  /* ----------------------------------------------------
     8. Affichage des articles sur les étoiles fixes du SVG
  ---------------------------------------------------- */

  function afficherConstellation(liste) {
    viderConstellation();

    const compteurs = {};
    const svgRect = svg.getBoundingClientRect();

    liste.forEach(echo => {
      const col = echo.collection;

      if (!compteurs[col]) compteurs[col] = 0;

      // Récupérer les étoiles fixes de cette constellation
      const etoiles = svg.querySelectorAll(`.etoile-fixe[data-col="${col}"]`);
      if (!etoiles.length) return;

      const index = compteurs[col] % etoiles.length;
      const etoile = etoiles[index];
      compteurs[col]++;

      const starRect = etoile.getBoundingClientRect();

      const point = document.createElement("div");
      point.classList.add("point-echo");

      point.style.left = (starRect.left - svgRect.left) + "px";
      point.style.top = (starRect.top - svgRect.top) + "px";

      point.dataset.slug = echo.slug;
      point.dataset.title = echo.title;

      point.addEventListener("click", () => {
        window.location.href = echo.url;
      });

      point.addEventListener("mouseenter", () => {
        jouerSon(echo.slug);
      });

      constellation.appendChild(point);
    });
  }

  /* ----------------------------------------------------
     9. Sons
  ---------------------------------------------------- */

  function jouerSon(slug) {
    const audio = document.getElementById("son-" + slug);
    if (audio) {
      audio.currentTime = 0;
      audio.play();
    }
  }

  /* ----------------------------------------------------
     10. Bouton Reset
  ---------------------------------------------------- */

  const boutonReset = document.getElementById("reset-echos");

  boutonReset.addEventListener("click", () => {
    document.getElementById("champ-resonance").value = "";
    document.getElementById("champ-echo").value = "";

    document.querySelectorAll(".point-echo").forEach(point => {
      point.classList.remove("revelation");
    });
  });

  /* ----------------------------------------------------
     11. Révélation poétique — Champ Résonance
  ---------------------------------------------------- */

  const champResonance = document.getElementById("champ-resonance");

  champResonance.addEventListener("input", () => {
    const mot = champResonance.value.trim().toLowerCase();

    document.querySelectorAll(".point-echo").forEach(point => {
      const titre = point.dataset.title.toLowerCase();

      if (mot === "") {
        point.classList.remove("revelation");
      } else if (titre.includes(mot)) {
        point.classList.add("revelation");
      } else {
        point.classList.remove("revelation");
      }
    });
  });

  /* ----------------------------------------------------
     12. Révélation poétique — Champ Appel d’écho
  ---------------------------------------------------- */

  const champEcho = document.getElementById("champ-echo");

  champEcho.addEventListener("input", () => {
    const mot = champEcho.value.trim().toLowerCase();

    document.querySelectorAll(".point-echo").forEach(point => {
      const titre = point.dataset.title.toLowerCase();

      if (mot === "") {
        point.classList.remove("revelation");
      } else if (titre.includes(mot)) {
        point.classList.add("revelation");
      } else {
        point.classList.remove("revelation");
      }
    });
  });

});
</script>
