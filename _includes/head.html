<meta charset="UTF-8">

<!-- Viewport mobile optimisé -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>{{ page.title }} — {{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="article">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ page.og_image | absolute_url }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ page.og_image | absolute_url }}">

<!-- CSS -->
<link rel="stylesheet" href="{{ '/assets_css/style.css?v=20260414' | relative_url }}">

<!-- Favicon -->
<link rel="icon" href="{{ '/images/og-favicon.png' | relative_url }}">
