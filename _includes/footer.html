<footer class="footer-fixed">

  <div class="footer-content">

    <!-- Bloc gauche : VIDE -->
    <div class="footer-left"></div>

    <!-- Bloc droit : newsletter + recherche + signature empilés -->
    <div class="footer-right">

      <div class="newsletter-mini">
        <div class="newsletter-mini-title">Recevoir les nouvelles</div>

        <form
          action="https://buttondown.com/api/emails/embed-subscribe/dig_it"
          method="post"
          class="embeddable-buttondown-form"
        >
          <input type="email" name="email" id="bd-email" placeholder="Votre adresse e-mail" required>
          <button type="submit">S’abonner</button>
        </form>
      </div>

      <div class="footer-search">
        <input type="text" id="search-input" placeholder="Rechercher...">
        <ul id="results-container"></ul>
      </div>

      <div class="footer-signature">
        © Céleste R. — CC BY‑NC‑ND
      </div>

    </div>

  </div>

</footer>

<!-- Script Simple-Jekyll-Search -->
<script src="https://unpkg.com/simple-jekyll-search/dest/simple-jekyll-search.min.js"></script>

<script>
  SimpleJekyllSearch({
    searchInput: document.getElementById('search-input'),
    resultsContainer: document.getElementById('results-container'),
    json: '/search.json',
    searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
    noResultsText: 'Aucun résultat',
    limit: 20
  })
</script>
