title: "Lapinsights"
description: "Terrier des mondes, éclats et correspondances"

# Configuration du site
url: "https://lapinsights-svg.github.io"
baseurl: ""

theme: null
markdown: kramdown
excerpt_separator: "<!--NOEXCERPT-->"

plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections éditoriales
collections:
  actualites:
    output: true
    permalink: /actualites/:title/
  creations:
    output: true
    permalink: /creations/:title/
  idees:
    output: true
    permalink: /idees/:title/
  spiritualite:
    output: true
    permalink: /spiritualite/:title/
  passe:
    output: true
    permalink: /passe/:title/
  vibrations:
    output: true
    permalink: /vibrations/:title/

# Layouts + Images OG par défaut (via path, sans modifier les fichiers .md)
defaults:
  - scope:
      path: "_actualites"
    values:
      layout: article
      og_image: /images/og-actualites.png

  - scope:
      path: "_creations"
    values:
      layout: article
      og_image: /images/og-creations.png

  - scope:
      path: "_idees"
    values:
      layout: article
      og_image: /images/og-idees.png

  - scope:
      path: "_spiritualite"
    values:
      layout: article
      og_image: /images/og-spiritualite.png

  - scope:
      path: "_passe"
    values:
      layout: article
      og_image: /images/og-passe.png

  - scope:
      path: "_vibrations"
    values:
      layout: article
      og_image: /images/og-vibrations.png

  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Gestion des dates futures
future: false

# Newsletter
newsletter_url: "https://buttondown.email/dig_it"

# Fichiers à inclure dans la build
include:
  - assets_css
  - robots.txt
  - search.json
  - images
  - assets/sons

# Fichiers à conserver
keep_files:
  - assets_css
