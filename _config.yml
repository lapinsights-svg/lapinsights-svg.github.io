title: "Lapinsights"
description: "Territoire éditorial souverain"
baseurl: ""
url: "https://lapinsights-svg.github.io"

markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections éditoriales
collections:
  actualites:
    output: true
  creations:
    output: true
  idees:
    output: true
  spiritualite:
    output: true
  passe:
    output: true
  archives:
    output: true

# Layouts par défaut pour CHAQUE collection
defaults:
  - scope:
      path: ""
      type: actualites
    values:
      layout: article

  - scope:
      path: ""
      type: creations
    values:
      layout: article

  - scope:
      path: ""
      type: idees
    values:
      layout: article

  - scope:
      path: ""
      type: spiritualite
    values:
      layout: article

  - scope:
      path: ""
      type: passe
    values:
      layout: article

  - scope:
      path: ""
      type: archives
    values:
      layout: article

  # Si un jour tu utilises _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Newsletter (Buttondown)
newsletter_url: "https://buttondown.email/dig_it"

# Open Graph / Partage
social_image: "/images/social-default.png"

# Fichiers à inclure
include:
  - assets_css
  - robots.txt
  - search.json

keep_files:
  - assets_css
