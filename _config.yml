title: "Lapinsights"
description: "Territoire éditorial souverain"

# Configuration du site
url: "https://lapinsights-svg.github.io"
baseurl: ""

theme: null
markdown: kramdown
excerpt_separator: "<!--NOEXCERPT-->"

plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections éditoriales
collections:
  actualites:
    output: true
    permalink: /actualites/:title/
  creations:
    output: true
    permalink: /creations/:title/
  idees:
    output: true
    permalink: /idees/:title/
  spiritualite:
    output: true
    permalink: /spiritualite/:title/
  passe:
    output: true
    permalink: /passe/:title/

# Layouts par défaut
defaults:
  - scope:
      path: ""
      type: actualites
    values:
      layout: article

  - scope:
      path: ""
      type: creations
    values:
      layout: article

  - scope:
      path: ""
      type: idees
    values:
      layout: article

  - scope:
      path: ""
      type: spiritualite
    values:
      layout: article

  - scope:
      path: ""
      type: passe
    values:
      layout: article

  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Gestion des dates futures
future: false

# Newsletter
newsletter_url: "https://buttondown.email/dig_it"

# Image sociale par défaut (Open Graph + Twitter)
social_image: "/images/lapinsights-og.png"
og_image: "/images/lapinsights-og.png"

# Fichiers à inclure dans la build
include:
  - assets_css
  - robots.txt
  - search.json
  - images
  - assets/sons

# Fichiers à conserver
keep_files:
  - assets_css
