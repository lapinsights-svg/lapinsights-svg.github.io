title: "Lapinsights"
description: "Territoire éditorial souverain"
baseurl: "/lapinsights"
url: "https://lapinsights-svg.github.io"

theme: null

markdown: kramdown

excerpt_separator: "<!--NOEXCERPT-->"

plugins:
  - jekyll-feed
  - jekyll-sitemap

collections:
  actualites:
    output: true
    permalink: /actualites/:title/
  creations:
    output: true
    permalink: /creations/:title/
  idees:
    output: true
    permalink: /idees/:title/
  spiritualite:
    output: true
    permalink: /spiritualite/:title/
  passe:
    output: true
    permalink: /passe/:title/

defaults:
  - scope:
      path: ""
      type: actualites
    values:
      layout: article

  - scope:
      path: ""
      type: creations
    values:
      layout: article

  - scope:
      path: ""
      type: idees
    values:
      layout: article

  - scope:
      path: ""
      type: spiritualite
    values:
      layout: article

  - scope:
      path: ""
      type: passe
    values:
      layout: article

  - scope:
      path: ""
      type: posts
    values:
      layout: post

future: false

newsletter_url: "https://buttondown.email/dig_it"

social_image: "/images/social-default.png"

include:
  - assets_css
  - robots.txt
  - search.json
  - images
  - assets/sons

keep_files:
  - assets_css
