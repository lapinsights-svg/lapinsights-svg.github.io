---
layout: default
title: Mémoire du terrier
---

<div class="contenu-page">
  <h2>Mémoire du terrier</h2>
  <p>Journal privé — stocké uniquement dans ton navigateur.</p>

  <button id="exporter">Exporter le journal</button>
  <button id="effacer">Effacer la mémoire locale</button>

  <h3>Timeline des passages</h3>
  <div id="timeline" style="border-left: 3px solid #333; padding-left: 1em;"></div>

  <h3>Diagramme des rubriques visitées</h3>
  <canvas id="diagramme" width="400" height="200"></canvas>

  <h3>Chemins parcourus (graphe de navigation)</h3>
  <canvas id="graphe" width="600" height="400"></canvas>

  <h3>Données brutes</h3>
  <pre id="journal" style="white-space: pre-wrap; background:#f7f7f7; padding:1em; border-radius:6px;"></pre>
</div>

<script>
(function() {

  // Charger le journal
  let journal = JSON.parse(localStorage.getItem("lapinsights_journal") || "[]");

  // Détection automatique des rubriques
  function rubriqueDepuisURL(path) {
    const segment = path.split("/")[1] || "";

  const mapping = {
    "": "Accueil",
    "index.html": "Accueil",
    "index.md": "Accueil",
    "actualites": "Actualités",
    "creations": "Créations",
    "idees": "Territoires d’idées",
    "passe": "Dans le passé",
    "spiritualite": "Spiritualité",
    "contact": "Contact",
    "archives": "Archives"
  };

  return mapping[segment] || "Autre";
}

  // Ajouter les tags aux entrées existantes
  journal = journal.map(e => {
    e.rubrique = detecterRubrique(e.page);
    return e;
  });

  // Affichage brut
  document.getElementById("journal").textContent = JSON.stringify(journal, null, 2);

  // Timeline visuelle
  function afficherTimeline() {
    let container = document.getElementById("timeline");
    container.innerHTML = "";

    journal.forEach(entry => {
      let bloc = document.createElement("div");
      bloc.style.marginBottom = "1em";

      bloc.innerHTML = `
        <div style="margin-left:0.5em;">
          <strong>${entry.page}</strong><br>
          <small>${new Date(entry.date).toLocaleString()}</small><br>
          <small>Durée : ${entry.duree}s</small><br>
          <span style="background:#eee; padding:2px 6px; border-radius:4px;">${entry.rubrique}</span>
        </div>
      `;

      container.appendChild(bloc);
    });
  }

  afficherTimeline();

  // Diagramme des rubriques
  function afficherDiagramme() {
    let ctx = document.getElementById("diagramme").getContext("2d");

    let stats = {};
    journal.forEach(e => {
      stats[e.rubrique] = (stats[e.rubrique] || 0) + 1;
    });

    let labels = Object.keys(stats);
    let valeurs = Object.values(stats);

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: "Pages visitées",
          data: valeurs,
          backgroundColor: "rgba(100, 100, 255, 0.5)",
          borderColor: "rgba(100, 100, 255, 1)",
          borderWidth: 1
        }]
      },
      options: {
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  // Graphe des chemins parcourus
  function afficherGraphe() {

    // Construire les transitions
    let transitions = {};

    for (let i = 1; i < journal.length; i++) {
      let from = journal[i - 1].page;
      let to = journal[i].page;

      let cle = from + "→" + to;
      transitions[cle] = (transitions[cle] || 0) + 1;
    }

    // Extraire les nœuds
    let nodes = {};
    Object.keys(transitions).forEach(cle => {
      let [from, to] = cle.split("→");
      nodes[from] = true;
      nodes[to] = true;
    });

    let nodeList = Object.keys(nodes).map((n, i) => ({
      id: i,
      label: n
    }));

    // Construire les liens
    let links = Object.keys(transitions).map(cle => {
      let [from, to] = cle.split("→");
      return {
        source: nodeList.find(n => n.label === from).id,
        target: nodeList.find(n => n.label === to).id,
        value: transitions[cle]
      };
    });

    // Dessiner le graphe
    new Chart(document.getElementById("graphe"), {
      type: 'graph',
      data: {
        nodes: nodeList,
        links: links
      },
      options: {
        layout: {
          improvedLayout: true
        },
        plugins: {
          legend: { display: false }
        }
      }
    });
  }

  // Charger Chart.js puis le plugin graph
  let script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/chart.js";
  script.onload = function() {
    afficherDiagramme();

    let plugin = document.createElement("script");
    plugin.src = "https://cdn.jsdelivr.net/npm/chartjs-chart-graph@3.9.0/build/index.umd.min.js";
    plugin.onload = afficherGraphe;
    document.body.appendChild(plugin);
  };
  document.body.appendChild(script);

  // Export local
  document.getElementById("exporter").addEventListener("click", function() {
    let blob = new Blob([JSON.stringify(journal, null, 2)], {type: "application/json"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "journal-lapinsights.json";
    a.click();
  });

  // Effacer la mémoire
  document.getElementById("effacer").addEventListener("click", function() {
    if (confirm("Effacer toute la mémoire locale du terrier ?")) {
      localStorage.removeItem("lapinsights_journal");
      location.reload();
    }
  });

})();
</script>
