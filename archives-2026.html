    <!-- CONTENU PRINCIPAL -->
    <main class="archives-container">

      <section class="page-header-block">

        <!-- ARTICLE 1 -->
        <div class="pdf-item">
          <span class="tag-date">25/01/2026</span>
          <div class="pdf-header">
            <h3>Pillage massif</h3>
            <button onclick="openPDF('bibliotheque/20260125_Pillage Massif.pdf')">Ouvrir</button>
          </div>
        </div>

        <!-- ARTICLE 2 -->
        <div class="pdf-item">
          <span class="tag-date">25/01/2026</span>

            <button onclick="openPDF('bibliotheque/20260125_Pfizer.pdf')">Ouvrir</button>
          </div>
        </div>

      </div>

    </main>

    <!-- MODALE PDF -->
    <div id="pdf-modal" class="pdf-modal">
      <div class="pdf-modal-content">
        <button class="pdf-close" onclick="closePDF()">✕</button>
        <iframe id="pdf-frame" src="" frameborder="0"></iframe>
      </div>
    </div>

    <!-- SCRIPT LECTEUR PDF -->
    <script>
      function openPDF(url) {
        const frame = document.getElementById("pdf-frame");
        frame.src = url + "#toolbar=0&navpanes=0&scrollbar=0&view=FitH";
        document.getElementById("pdf-modal").classList.add("open");
      }

      function closePDF() {
        const modal = document.getElementById("pdf-modal");
        const frame = document.getElementById("pdf-frame");
        frame.src = "";
        modal.classList.remove("open");
      }
    </script>
