<body>

  {% include header.html %}

  <!-- 🔍 Barre de recherche globale -->
  <div class="search-zone" style="padding: 1.5em; max-width: 900px; margin: 0 auto;">
    <input type="text" id="search-input" placeholder="Rechercher..." style="width: 100%; padding: 0.6em;">
    <ul id="results-container" style="margin-top: 1em;"></ul>
  </div>

  <main class="contenu-scroll">
    {{ content }}
  </main>

  {% include footer.html %}

  <div id="pdfModal">
    <div class="pdf-modal-content">
      <button class="pdf-close" onclick="closePDF()">✕</button>
      <iframe id="pdf-frame" src=""></iframe>
    </div>
  </div>

<script>
function openPDF(url) {
  const modal = document.getElementById('pdfModal');
  const frame = document.getElementById('pdf-frame');
  frame.src = url;
  modal.classList.add('open');
}

function closePDF() {
  const modal = document.getElementById('pdfModal');
  const frame = document.getElementById('pdf-frame');
  frame.src = "";
  modal.classList.remove('open');
}
</script>

<script>
function shareArticle(title, url, network = null) {
  if (network === "facebook") {
    const fbUrl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(url);
    window.open(fbUrl, "_blank", "noopener");
    return;
  }

  if (network === "twitter") {
    const twUrl = "https://twitter.com/intent/tweet?text="
                  + encodeURIComponent(title)
                  + "&url=" + encodeURIComponent(url);
    window.open(twUrl, "_blank", "noopener");
    return;
  }

  if (network === "whatsapp") {
    const waUrl = "https://api.whatsapp.com/send?text="
                  + encodeURIComponent(title + " " + url);
    window.open(waUrl, "_blank", "noopener");
    return;
  }

  if (network === "email") {
    const mailUrl = "mailto:?subject="
                    + encodeURIComponent(title)
                    + "&body=" + encodeURIComponent(url);
    window.location.href = mailUrl;
    return;
  }

  if (navigator.share) {
    navigator.share({
      title: title,
      url: url
    });
    return;
  }

  navigator.clipboard.writeText(url);
  alert("Lien copié !");
}
</script>

<button id="backToTop" title="Remonter le terrier">🐇↟</button>

<script>
  const btn = document.getElementById("backToTop");

  window.onscroll = function() {
    if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
      btn.style.display = "block";
    } else {
      btn.style.display = "none";
    }
  };

  btn.onclick = function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
</script>

<!-- MODE FANTÔME -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  if (window.location.pathname.includes("memoire")) {

    const zone = document.querySelector(".contenu-page");

    const bouton = document.createElement("button");
    bouton.id = "toggleFantome";
    bouton.style.marginBottom = "1em";

    function majBouton() {
      if (localStorage.getItem("lapinsights_ignore") === "true") {
        bouton.textContent = "👻 Mode fantôme : ACTIVÉ";
        bouton.style.background = "#333";
        bouton.style.color = "white";
      } else {
        bouton.textContent = "👻 Activer le mode fantôme";
        bouton.style.background = "";
        bouton.style.color = "";
      }
    }

    bouton.onclick = function() {
      if (localStorage.getItem("lapinsights_ignore") === "true") {
        localStorage.removeItem("lapinsights_ignore");
      } else {
        localStorage.setItem("lapinsights_ignore", "true");
      }
      majBouton();
    };

    majBouton();
    zone.insertBefore(bouton, zone.children[2]);
  }
});
</script>
