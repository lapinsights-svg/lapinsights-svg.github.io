<!DOCTYPE html>
<html lang="fr">
<head>
  {% include head.html %}
</head>

<body>

  {% include header.html %}

  <main class="contenu-scroll">
    {{ content }}
  </main>

  {% include footer.html %}

  <div id="pdfModal">
    <div class="pdf-modal-content">
      <button class="pdf-close" onclick="closePDF()">✕</button>
      <iframe id="pdf-frame" src=""></iframe>
    </div>
  </div>

<script>
function openPDF(url) {
  const modal = document.getElementById('pdfModal');
  const frame = document.getElementById('pdf-frame');
  frame.src = url;
  modal.classList.add('open');
}

function closePDF() {
  const modal = document.getElementById('pdfModal');
  const frame = document.getElementById('pdf-frame');
  frame.src = "";
  modal.classList.remove('open');
}
</script>

<script>
function shareArticle(title, url, network = null) {
  if (network === "facebook") {
    const fbUrl = "https://www.facebook.com/sharer/sharer.php?u=" + encodeURIComponent(url);
    window.open(fbUrl, "_blank", "noopener");
    return;
  }

  if (network === "twitter") {
    const twUrl = "https://twitter.com/intent/tweet?text="
                  + encodeURIComponent(title)
                  + "&url=" + encodeURIComponent(url);
    window.open(twUrl, "_blank", "noopener");
    return;
  }

  if (network === "whatsapp") {
    const waUrl = "https://api.whatsapp.com/send?text="
                  + encodeURIComponent(title + " " + url);
    window.open(waUrl, "_blank", "noopener");
    return;
  }

  if (network === "email") {
    const mailUrl = "mailto:?subject="
                    + encodeURIComponent(title)
                    + "&body=" + encodeURIComponent(url);
    window.location.href = mailUrl;
    return;
  }

  if (navigator.share) {
    navigator.share({
      title: title,
      url: url
    });
    return;
  }

  navigator.clipboard.writeText(url);
  alert("Lien copié !");
}
</script>
<button id="backToTop" title="Remonter le terrier">🐇↟</button>

<script>
  const btn = document.getElementById("backToTop");

  window.onscroll = function() {
    if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
      btn.style.display = "block";
    } else {
      btn.style.display = "none";
    }
  };

  btn.onclick = function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
</script>

</body>
</html>
